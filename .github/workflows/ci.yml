name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint :
    strategy:
      matrix:
        python-version : ["3.10", "3.11", "3.12"]
    runs-on : ubuntu-latest
    steps :
      - uses : actions/checkout@v4
      - uses:  actions/setup-python@v5
        with :
          python-version : ${{matrix.python-version}}
      - name : pip install all requirements
        run : pip install -r requirements.txt
      - name : ruff checking 
        run : ruff check 
  test:
    needs : lint 
    strategy:
      matrix :
        python-version : ["3.10", "3.11" ,"3.12"]
    runs-on: ubuntu-latest
    services :
      postgres:
        image: postgres:16
        env :
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:

      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - uses : actions/checkout@v4
      

      - uses : actions/setup-python@v5
        with :
          python-version : ${{matrix.python-version}}
      - name : install all requirments
        run : pip install -r requirements.txt
      - name : collect static file 
        run : python manage.py collectstatic
      - name : run all test 
        run : python manage.py test
      - name : make migrations 
        run :  python manage.py migrate
      

  build:
    runs-on : ubuntu-latest
    needs : test
    steps :
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/django-app:latest .

      
      - name: Push image to DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/django-app:latest

      - name: Show images of repo
        run: docker images
  
  test_image :
    runs-on : ubuntu-latest
    needs : build
    steps :
      - name: checkout code 
        uses: actions/checkout@v4
      - name : pull image from docker 
        run  : docker pull ${{secrets.DOCKER_USERNAME}}/django-app:latest
      - name : Run containers
        run : |
           docker run -d \
            --name django-test \
            -p 8000:8000 \
            -e DB_NAME=test_db
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e DB_HOST=host.docker.internal \
            -e DB_PORT=5432 \
            ${{secrets.DOCKER_USERNAME}}/django-app:latest

      - name : show running container
        run : docker ps
      - name : show logs
        run : docker logs django-test


  





