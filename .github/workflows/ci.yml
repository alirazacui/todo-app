name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint :
    runs-on : ubuntu-latest
    steps :
      - uses : actions/checkout@v4
      - uses:  actions/setup-python@v5
        with :
          python-version : "3.12"
      - name : pip install all requirements
        run : pip install -r requirements.txt
      - name : ruff checking 
        run : ruff check 
  test:
    runs-on: ubuntu-latest
    steps:
      - uses : actions/checkout@v4
      - uses : actions/setup-python@v5
        with :
          python-version : "3.12"
      - name : install all requirments
        run : pip install -r requirements.txt
      - name : collect static file 
        run : python manage.py collectstatic
      - name : run all test 
        run : python manage.py test
      
    





