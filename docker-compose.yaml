services :
   db: 
    image: postgres:16
    environment :
     POSTGRES_DB: todo_db
     POSTGRES_USER: postgres
     POSTGRES_PASSWORD : postgres
    
      
   web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_NAME: todo_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db 
    
